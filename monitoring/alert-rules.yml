groups:
  - name: nexcell-alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_errors_total[1m])) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is too high"

      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency detected"
          description: "P95 latency is above 1 second"

      - alert: HighCPUUsage
        expr: system_cpu_usage_percent > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU is above 80 percent"

      - alert: HighMemoryUsage
        expr: system_memory_usage_percent > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory is above 85 percent"

      - alert: AppDown
        expr: up{job="nexcell-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NexCell app is down"
          description: "Prometheus cannot reach nexcell-app"
